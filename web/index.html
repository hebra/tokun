<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
      name="description"
      content="Tokun: A lightweight, privacy-focused JWT debugger."
    >
    <title>Tokun — JWT Debugger</title>
    <link rel="icon" type="image/png" href="assets/tokun.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    >

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/styles.css">
    <script>
      // Prevent Flash of Unstyled Content (FOUC)
      (function () {
        const savedTheme = localStorage.getItem("tokun-theme");
        const systemTheme =
          matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
        document.documentElement.setAttribute(
          "data-theme",
          savedTheme || systemTheme,
        );
      })();
    </script>
  </head>
  <body>
    <div class="container">
      <header>
        <div class="header-top">
          <div class="header-brand">
            <img src="assets/tokun.png" alt="" class="logo">
            <h1>Tokun — JWT Debugger</h1>
          </div>
          <button
            id="theme-toggle"
            class="theme-toggle"
            aria-label="Toggle dark mode"
          >
            <svg
              class="sun-icon"
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg
              class="moon-icon"
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </button>
        </div>
        <div class="header-accent"></div>
      </header>

      <main>
        <section class="editor-section">
          <div class="section-header">
            <h2>Encoded Token</h2>
            <button
              id="copy-encoded"
              class="btn-icon"
              aria-label="Copy encoded token"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                <path
                  d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
                />
              </svg>
            </button>
          </div>
          <div class="editor-container">
            <label for="encoded-token">Paste your encoded JWT here:</label>
            <textarea
              id="encoded-token"
              placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
            ></textarea>
          </div>
        </section>

        <section class="editor-section">
          <div class="section-header">
            <h2>Decoded Token</h2>
          </div>
          <div class="editor-container">
            <div class="field-header">
              <label for="header-editor">Header (JSON):</label>
              <button
                id="copy-header"
                class="btn-icon"
                aria-label="Copy header JSON"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                  <path
                    d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
                  />
                </svg>
              </button>
            </div>
            <textarea
              id="header-editor"
              placeholder='{ "alg": "HS256", "typ": "JWT" }'
            ></textarea>

            <div class="field-header">
              <label for="payload-editor">Payload (JSON):</label>
              <button
                id="copy-payload"
                class="btn-icon"
                aria-label="Copy payload JSON"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                  <path
                    d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
                  />
                </svg>
              </button>
            </div>
            <textarea
              id="payload-editor"
              placeholder='{ "sub": "1234567890", "name": "John Doe", "iat": 1516239022 }'
            ></textarea>

            <div class="field-header">
              <label for="signature-editor">Signature:</label>
              <button
                id="copy-signature"
                class="btn-icon"
                aria-label="Copy signature"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                  <path
                    d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
                  />
                </svg>
              </button>
            </div>
            <textarea
              id="signature-editor"
              placeholder="Signature portion (encoded)..."
            ></textarea>

            <div class="signature-verification">
              <div class="field-header">
                <label for="signature-secret">Verify Signature (Secret):</label>
                <span id="signature-status" class="signature-status"
                >NO TOKEN</span>
              </div>
              <input
                type="password"
                id="signature-secret"
                class="secret-input"
                placeholder="Enter secret to verify..."
              >
              <p id="verification-note" class="verification-note">
                Enter the secret key to verify the token's integrity. Supported
                algorithms: HS256, HS384, HS512.
              </p>
            </div>
          </div>
        </section>
      </main>

      <footer>
        <p>&copy; 2026 yogu.one - Licensed under GNU GPL v3.</p>
      </footer>
    </div>

    <script type="module" src="js/theme.js"></script>
    <script type="module" src="js/jwt.js"></script>
  </body>
</html>
